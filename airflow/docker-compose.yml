version: "3.9"

x-airflow-env: &airflow-env
  AIRFLOW__CORE__EXECUTOR: LocalExecutor
  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://postgres:postgres@postgres:5432/postgres
  AIRFLOW__CORE__FERNET_KEY: ""
  AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
  AIRFLOW__CORE__LOAD_EXAMPLES: "false"
  AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
  AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: "true"
  AIRFLOW_CONN_SLACK_WEBHOOK: "http://:DUMMY_WEBHOOK_URL@hooks.slack.com/services/PLACEHOLDER"
  AIRFLOW_CONN_SENTINEL_METRICS_DB: "duckdb:///opt/airflow/data/sentinel_reports.duckdb"
  SENTINEL_DUCKDB_PATH: "/usr/local/airflow/data/sentinel_reports.duckdb"
  SENTINEL_DATA_DIR: "/usr/local/airflow/data"
  AIRFLOW__CORE__AUTH_MANAGER: airflow.api_fastapi.auth.managers.simple.simple_auth_manager.SimpleAuthManager
  AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_USERS: "admin:ADMIN"
  AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_ALL_ADMINS: "True"

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 10s
      retries: 5

  airflow-init:
    build:
      context: ..
      dockerfile: airflow/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      <<: *airflow-env
    entrypoint: /bin/bash
    command:
      - -c
      - airflow db migrate
    volumes:
      - ./dags:/usr/local/airflow/dags
      - ./plugins:/usr/local/airflow/plugins
      - ./include:/usr/local/airflow/include
      - ./tests:/usr/local/airflow/tests
      - ./data:/usr/local/airflow/data

  webserver:
    build:
      context: ..
      dockerfile: airflow/Dockerfile
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      <<: *airflow-env
    command: airflow api-server
    ports:
      - "8080:8080"
    volumes:
      - ./dags:/usr/local/airflow/dags
      - ./plugins:/usr/local/airflow/plugins
      - ./include:/usr/local/airflow/include
      - ./tests:/usr/local/airflow/tests
      - ./data:/usr/local/airflow/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/api/v2/monitor/health"]
      interval: 30s
      retries: 5

  scheduler:
    build:
      context: ..
      dockerfile: airflow/Dockerfile
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      <<: *airflow-env
    command: airflow scheduler
    volumes:
      - ./dags:/usr/local/airflow/dags
      - ./plugins:/usr/local/airflow/plugins
      - ./include:/usr/local/airflow/include
      - ./tests:/usr/local/airflow/tests
      - ./data:/usr/local/airflow/data

  triggerer:
    build:
      context: ..
      dockerfile: airflow/Dockerfile
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      <<: *airflow-env
    command: airflow triggerer
    volumes:
      - ./dags:/usr/local/airflow/dags
      - ./plugins:/usr/local/airflow/plugins
      - ./include:/usr/local/airflow/include
      - ./data:/usr/local/airflow/data

  dag-processor:
    build:
      context: ..
      dockerfile: airflow/Dockerfile
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      <<: *airflow-env
    command: airflow dag-processor
    volumes:
      - ./dags:/usr/local/airflow/dags
      - ./plugins:/usr/local/airflow/plugins
      - ./include:/usr/local/airflow/include
      - ./data:/usr/local/airflow/data

volumes:
  postgres-data:
